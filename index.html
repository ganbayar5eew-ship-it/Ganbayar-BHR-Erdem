<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Улсын шалгалтын систем | 3-р баг</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #4834d4; --success: #2ecc71; --error: #e74c3c; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 550px; }
        
        #login-screen { text-align: center; }
        .logo { font-size: 50px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus, select:focus { border-color: var(--primary); }
        
        .btn-login { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }

        #main-content { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f9f9f9; padding-bottom: 15px; margin-bottom: 20px; }
        
        .task-card { background: #fff; border: 2px solid #f0f0f0; padding: 20px; border-radius: 18px; margin-bottom: 15px; transition: 0.4s; }
        .task-card.correct { border-color: var(--success); background: #f6fff8; }
        .task-card.wrong { border-color: var(--error); background: #fff9f9; }
        
        /* Сонголтуудын дизайн */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .option-btn { 
            background: #f8f9fa; border: 2px solid #dee2e6; padding: 12px; 
            border-radius: 10px; cursor: pointer; transition: 0.2s; font-weight: 500; font-size: 0.95rem;
        }
        .option-btn:hover { background: #e9ecef; border-color: #adb5bd; }
        .option-btn:active { transform: scale(0.98); }
        
        .status-msg { margin-top: 10px; font-weight: bold; text-align: center; }
        .btn-add { background: var(--success); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div id="login-screen" class="container">
    <div class="logo">📝</div>
    <h2>Улсын шалгалт</h2>
    <input type="text" id="province" placeholder="Аймаг / Хотын нэр">
    <input type="text" id="school" placeholder="Сургуулийн нэр">
    <input type="text" id="grade" placeholder="Анги (Жишээ нь: 9)">
    <select id="subject-select">
        <option value="">--- Хичээлээ сонгоно уу ---</option>
        <option value="Байгалийн ухаан">Байгалийн ухаан</option>
        <option value="Математик">Математик</option>
        <option value="Монгол хэл">Монгол хэл</option>
        <option value="Англи хэл">Англи хэл</option>
        <option value="Нийгмийн ухаан">Нийгмийн ухаан</option>
    </select>
    <button class="btn-login" onclick="login()">Нэвтрэх</button>
</div>

<div id="main-content" class="container">
    <div class="header">
        <div id="user-display" style="font-size: 0.9rem; color: #636e72;"></div>
        <button onclick="location.reload()" style="border:none; background:none; cursor:pointer; font-size:1.5rem;">🚪</button>
    </div>
    <div id="status-bar" style="text-align:center; font-size:0.85rem; color:#0984e3; margin-bottom:15px; font-weight:bold;">Ачаалж байна...</div>
    <div id="task-list"></div>
    <button id="admin-btn" class="btn-add" style="display:none;" onclick="addNewTask()">+ Даалгавар нэмэх (Багш)</button>
</div>

    let userData = {};

    function login() {
        userData.province = document.getElementById('province').value.trim();
        userData.school = document.getElementById('school').value.trim();
        userData.grade = document.getElementById('grade').value.trim();
        userData.subject = document.getElementById('subject-select').value;
        userData.name = prompt("Овог нэрээ оруулна уу:");

        if (!userData.province || !userData.school || !userData.grade || !userData.subject || !userData.name) {
            alert("Мэдээллээ бүрэн оруулна уу!");
            return;
        }

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';

        loadTasks();
    }
